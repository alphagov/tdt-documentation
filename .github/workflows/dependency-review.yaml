name: 'Dependency Review'
on:
  push:
    branches: [ "**" ]      # Run on every push to every branch
  pull_request:
      branches: [ "main" ] # Run on PRs targeting main
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v4
        with:
          # If it's a PR, use the target branch. If it's a push, use 'main'.
          base_ref: ${{ github.event.pull_request.base.sha || 'main' }}
          # If it's a PR, use the source branch. If it's a push, use the current commit.
          head_ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fail-on-severity: high
          show-patched-versions: true