name: 'Build and test'
on:
  push:
    branches-ignore: [ "main" ]      # Run on every push to every branch except main - deploy-to-pages will trigger that step anyway on a push to main
  pull_request:
    branches: [ "main" ] # Run on PRs targeting main
  workflow_dispatch:
  workflow_call:
    inputs:
      upload-artifact:
        default: false
        required: false
        type: boolean

jobs:
  run-dependency-review:
    uses: ./.github/workflows/dependency-review.yaml
  build:
    needs: run-dependency-review
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: '.nvmrc'

    - uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
      with:
        bundler-cache: true

    - name: Install gems
      run: bundle install

    - name: Build
      run: bundle exec middleman build

    - name: Upload artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4.1.3
      if: ${{ inputs.upload-artifact }}
      with:
        name: build
        path: build/**
        retention-days: 1
